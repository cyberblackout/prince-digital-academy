services:
  - type: web
    name: prince-digital-academy
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: AfricaTalking_API_KEY
        sync: false
      - key: AfricaTalking_USERNAME
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_EMAIL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false